<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قائمة المسؤولين</title>
    <link rel="stylesheet" href="/static/admins.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="gaming-bg">

    <h1 class="page-title">👑 قائمة مسؤولي المهام</h1>

    <div class="admins-wrapper">
        <div class="admins-grid">
            {% for admin in admins %}
            <div class="admin-card">
                <div class="card-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="task-name">{{ admin.task_name }}</div>
                <div class="divider"></div>
                <div class="admin-display-name">{{ admin.admin_name }}</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="bottom-nav">
        {% if session.get('is_admin') %}
            <a href="/edit_admins" class="nav-link admin-btn">⚙️ تعديل المسؤولين</a>
        {% endif %}
        <a href="/" class="nav-link">🏠 العودة للرئيسية</a>
    </div>

</body>
</html>
