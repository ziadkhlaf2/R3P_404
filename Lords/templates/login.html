<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - R3P Alliance</title>
    <link rel="stylesheet" href="/static/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="gaming-bg"> <div class="main-container" id="container">
        
        <div class="form-container sign-up-container">
            <form action="/register" method="POST">
                <h1>إنشاء حساب</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-github"></i></a>
                </div>
                <span>أو استخدم بريدك الإلكتروني للتسجيل</span>
                <input type="text" name="username" placeholder="اسم المستخدم" required />
                <input type="password" name="password" placeholder="كلمة المرور" required />
                <button type="submit">إنشاء حساب</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form action="/login" method="POST">
                <h1>تسجيل الدخول</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://chat.whatsapp.com/F5aAacrBOYWCnVXQJcPjmW?mode=gi_t" class="social"><i class="fab fa-whatsapp"></i></a>
                </div>
                <span>أو استخدم حسابك المسجل</span>
                <input type="text" name="username" placeholder="اسم المستخدم" required />
                <input type="password" name="password" placeholder="كلمة المرور" required />
                <a href="https://wa.me/qr/YZKJV22G2NY2L1" class="forgot-pass">نسيت كلمة المرور؟</a>
                <button type="submit">دخول</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>أهلاً بك مجدداً!</h1>
                    <p>لتبقى على اتصال معنا، يرجى تسجيل الدخول بمعلوماتك الشخصية</p>
                    <button class="ghost" id="signIn">تسجيل الدخول</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>أهلاً يا بطل!</h1>
                    <p>أدخل بياناتك الشخصية وابدأ رحلتك معنا في التحالف</p>
                    <button class="ghost" id="signUp">إنشاء حساب</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
    </script>

</body>
</html>
